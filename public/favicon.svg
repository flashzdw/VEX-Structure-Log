<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 主体：白→极浅蓝 渐变（与网站 bg-white / bg-blue-50 一致） -->
    <linearGradient id="glassBody" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>

    <!-- 顶部高光：液态玻璃上反光（与网站圆角白卡一致） -->
    <linearGradient id="topShine" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- 主体渐变：与网站 text-gray-900 主色一致 -->
    <linearGradient id="iconBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>

    <!-- 蓝色高光（与网站 text-blue-600 一致） -->
    <linearGradient id="blueAccent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>

    <!-- 圆角矩形裁剪 -->
    <clipPath id="iconClip">
      <rect x="40" y="40" width="432" height="432" rx="104" ry="104"/>
    </clipPath>

    <!-- 投影高斯模糊 -->
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- 1. 底层柔光投影 -->
  <rect x="40" y="48" width="432" height="432" rx="104" ry="104" fill="#111827" opacity="0.10" filter="url(#softBlur)"/>

  <!-- 2. 主体 -->
  <g clip-path="url(#iconClip)">
    <!-- 玻璃底：白→极浅蓝 -->
    <rect x="40" y="40" width="432" height="432" fill="url(#glassBody)"/>

    <!-- 顶部高光（液态玻璃特征） -->
    <rect x="40" y="40" width="432" height="180" fill="url(#topShine)" opacity="0.9"/>

    <!-- 3. 中央主体：笔记本 + 齿轮组合（VEX 工程笔记主题） -->
    <g transform="translate(256 256)">
      <!-- 笔记本底（圆角矩形，深灰，与网站 text-gray-900 一致） -->
      <rect x="-110" y="-130" width="220" height="260" rx="24" fill="url(#iconBody)"/>

      <!-- 笔记本左侧：3 条书写线（白色，象征笔记） -->
      <rect x="-86" y="-90" width="84" height="10" rx="5" fill="#FFFFFF" fill-opacity="0.95"/>
      <rect x="-86" y="-58" width="68" height="10" rx="5" fill="#FFFFFF" fill-opacity="0.7"/>
      <rect x="-86" y="-26" width="78" height="10" rx="5" fill="#FFFFFF" fill-opacity="0.7"/>

      <!-- 笔记本右侧：齿轮（VEX 机器人主题，蓝色高亮，对应网站 text-blue-600） -->
      <g transform="translate(34 56)">
        <!-- 齿轮 8 齿 -->
        <g fill="url(#blueAccent)">
          <rect x="-8" y="-58" width="16" height="22" rx="2.5"/>
          <rect x="-8" y="36" width="16" height="22" rx="2.5"/>
          <rect x="-58" y="-8" width="22" height="16" rx="2.5"/>
          <rect x="36" y="-8" width="22" height="16" rx="2.5"/>
          <rect x="-8" y="-58" width="16" height="22" rx="2.5" transform="rotate(45)"/>
          <rect x="-8" y="36" width="16" height="22" rx="2.5" transform="rotate(45)"/>
          <rect x="-58" y="-8" width="22" height="16" rx="2.5" transform="rotate(45)"/>
          <rect x="36" y="-8" width="22" height="16" rx="2.5" transform="rotate(45)"/>
        </g>
        <!-- 齿轮主体圆 -->
        <circle r="42" fill="url(#blueAccent)"/>
        <!-- 齿轮中心镂空（白色，对应玻璃底） -->
        <circle r="16" fill="#FFFFFF"/>
        <!-- 齿轮顶部一道高光（液态玻璃特征） -->
        <path d="M -28 -22 A 36 36 0 0 1 22 -28" stroke="#FFFFFF" stroke-width="6" stroke-opacity="0.55" stroke-linecap="round" fill="none"/>
      </g>
    </g>
  </g>

  <!-- 4. 内描边（液态玻璃厚度感） -->
  <rect x="40" y="40" width="432" height="432" rx="104" ry="104" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.7"/>

  <!-- 5. 外细描边（与网站 border-gray-200 一致） -->
  <rect x="41" y="41" width="430" height="430" rx="103" ry="103" fill="none" stroke="#E5E7EB" stroke-width="1" stroke-opacity="0.8"/>
</svg>
